<!-- src/app/features/auth/login/login.component.html -->
<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">🎬</span>
        <h1>CineStream</h1>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to continue watching</p>

      <div class="alert alert-error" *ngIf="error"> 
        <span>⚠</span> {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="field" [class.has-error]="email.invalid && email.touched">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="field-error" *ngIf="email.errors?.['required'] && email.touched">
            Email is required.
          </span>
          <span class="field-error" *ngIf="email.errors?.['email'] && email.touched">
            Enter a valid email.
          </span>
        </div>

        <div class="field" [class.has-error]="password.invalid && password.touched">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁' }}
            </button>
          </div>
          <span class="field-error" *ngIf="password.errors?.['required'] && password.touched">
            Password is required.
          </span>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a routerLink="/register">Create one free</a>
      </p>
    </div>
  </div>
</div>
